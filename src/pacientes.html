          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Agenda
      </a>
      <a class="nav-link" href="horarios.html">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        Horarios
      </a>
      <a class="nav-link active" href="pacientes.html">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Pacientes
      </a>
    </div>
    <button class="nav-bell">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </button>
  </nav>

  <div class="main">
    <div class="p-title-card">
      <div class="p-title-left">
        <div class="p-title-icon">👥</div>
        <div>
          <h1 class="p-title">Pacientes</h1>
          <p class="p-subtitle">Gestiona el listado de tus pacientes.</p>
        </div>
      </div>
      <button class="btn-nuevo-paciente" onclick="openModalPaciente()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Nuevo Paciente
      </button>
    </div>

    <div class="p-search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Buscar por nombre o C.I." oninput="renderTable()">
    </div>

    <div class="p-table-card">
      <table class="p-table">
        <thead>
          <tr>
            <th>Nombre</th><th>C.I.</th><th>Teléfono</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody id="patientsTable"></tbody>
      </table>
      <p class="p-empty" id="pEmpty" style="display:none">No se encontraron pacientes.</p>
    </div>
  </div>

  <!-- MODAL: NUEVO / EDITAR -->
  <div class="modal-overlay" id="modalPaciente">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalPacienteTitle">Nuevo Paciente</h2>
        <button class="modal-close" onclick="closeModalPaciente()">&#x2715;</button>
      </div>
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" id="pNombre" placeholder="Ej. Ana García">
      </div>
      <div class="form-group">
        <label>Carnet de Identidad (C.I.)</label>
        <input type="text" id="pCI" placeholder="Ej. 1234567">
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input type="tel" id="pTelefono" placeholder="Ej. 591-70000000">
      </div>
      <div class="form-group">
        <label>Notas (opcional)</label>
        <textarea id="pNotas" placeholder="Información adicional…"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel-modal" onclick="closeModalPaciente()">Cancelar</button>
        <button class="btn-save" onclick="savePaciente()">Guardar</button>
      </div>
    </div>
  </div>

  <!-- CONFIRM DELETE -->
  <div class="modal-overlay" id="modalConfirm">
    <div class="modal" style="max-width:340px;text-align:center">
      <div style="font-size:2rem;margin-bottom:10px">🗑️</div>
      <h2 style="margin-bottom:8px">Eliminar paciente</h2>
      <p style="font-size:0.88rem;color:var(--purple-mid);font-weight:600;margin-bottom:20px">
        ¿Estás seguro? Esta acción no se puede deshacer.
      </p>
      <div class="modal-actions">
        <button class="btn-cancel-modal" onclick="closeConfirm()">Cancelar</button>
        <button class="btn-save" style="background:#e53e3e" onclick="confirmDelete()">Eliminar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

</body>
